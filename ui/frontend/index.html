<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chess Engine UI</title>

  <link rel="stylesheet" href="style.css">

  <!-- ✅ chessboard.js CSS -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
</head>

<body>
  <h1>♟️ Play vs AI (AlphaZero-style)</h1>

  <div class="container">
    <div id="board" style="width: 420px;"></div>

    <div class="panel">
      <button id="resetBtn">Reset Game</button>
      <label><b>Play as:</b></label>
        <select id="sideSelect">
        <option value="white" selected>White</option>
        <option value="black">Black</option>
        </select>
      <p><b>Status:</b> <span id="status">Ready</span></p>
      <p><b>FEN:</b></p>
      <textarea id="fenBox" rows="4" readonly></textarea>
    </div>
  </div>

  <!-- ✅ 1) jQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

  <!-- ✅ 2) chess.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

  <!-- ✅ 3) chessboard.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

  <!-- ✅ 4) your script -->
  <script src="script.js"></script>
</body>
</html>
